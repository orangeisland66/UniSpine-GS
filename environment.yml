name: unispine_gs
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - cudatoolkit=11.6
  # PyTorch 1.12.x can fail to import with newer MKL releases:
  # undefined symbol: iJIT_NotifyEvent
  - mkl=2024.0.0
  - plyfile=0.8.1
  - python=3.7.13
  - pip=22.3.1
  - pytorch=1.12.1
  - torchaudio=0.12.1
  - torchvision=0.13.1
  - tqdm
  - imageio
  - pyyaml
  - scipy
  - pip:
    - opencv-python
    - nibabel<5
